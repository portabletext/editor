name: check-knip

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check-knip:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: lts/*

      - name: Install project dependencies
        run: pnpm install

      - name: Check for unused code and dependencies
        run: pnpm check:knip
